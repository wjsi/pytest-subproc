minimum_pre_commit_version: 2.15.0
default_stages: [commit, merge-commit, push]
ci:
  autofix_prs: false
repos:
- repo: local
  hooks:
  - id: check-yaml
    name: check-yaml
    entry: check-yaml
    language: python
    types_or: [yaml]
    additional_dependencies: [pre-commit-hooks==4.4.0]
  - id: end-of-file-fixer
    name: end-of-file-fixer
    entry: end-of-file-fixer
    language: python
    additional_dependencies: [pre-commit-hooks==4.4.0]
  - id: trailing-whitespace
    name: trailing-whitespace
    entry: trailing-whitespace-fixer
    language: python
    additional_dependencies: [pre-commit-hooks==4.4.0]
  - id: check-illegal-windows-names
    name: check illegal windows names
    entry: Illegal windows filenames detected
    language: fail
    files: '(?i)((^|/)(\\|CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])(\.|/|$)|:)'
- repo: local
  hooks:
  - id: flake8
    name: flake8
    description: "Flake8"
    entry: flake8
    language: python
    require_serial: true
    types_or: [python, pyi]
    additional_dependencies: [
      'flake8==6.1.0; python_version>="3.8"',
    ]
- repo: local
  hooks:
  - id: black
    name: black
    description: "Black"
    entry: black
    language: python
    require_serial: true
    types_or: [python, pyi]
    additional_dependencies: [black==23.3.0]
- repo: local
  hooks:
    - id: isort
      name: isort
      description: "isort"
      entry: isort
      language: python
      require_serial: true
      types_or: [python, pyi]
      args: [--profile, black]
      additional_dependencies: [isort==5.11.0]
